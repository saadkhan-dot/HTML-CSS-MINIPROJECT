<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All SVG Animations & Transitions</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>SVG Animations & Transitions – Full Demo</h1>

<!-- 1. CSS TRANSITION -->
<h2>1️⃣ CSS Hover Transition</h2>
<svg width="150" height="150">
  <circle cx="75" cy="75" r="35" class="hover-circle" />
</svg>

<!-- 2. MOVE ANIMATION -->
<h2>2️⃣ Move Animation</h2>
<svg width="300" height="100">
  <circle cx="30" cy="50" r="20" fill="orange">
    <animate
      attributeName="cx"
      from="30"
      to="270"
      dur="2s"
      repeatCount="indefinite" />
  </circle>
</svg>

<!-- 3. COLOR ANIMATION -->
<h2>3️⃣ Color Change Animation</h2>
<svg width="200" height="100">
  <rect x="20" y="20" width="160" height="60">
    <animate
      attributeName="fill"
      values="red;purple;blue;red"
      dur="2s"
      repeatCount="indefinite" />
  </rect>
</svg>

<!-- 4. SCALE / PULSE -->
<h2>4️⃣ Scale (Pulse / Heartbeat)</h2>
<svg width="150" height="150" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="20" fill="crimson">
    <animateTransform
      attributeName="transform"
      type="scale"
      values="1;1.3;1"
      dur="0.8s"
      repeatCount="indefinite" />
  </circle>
</svg>

<!-- 5. ROTATE (SMIL) -->
<h2>5️⃣ Rotate Animation (SMIL)</h2>
<svg width="120" height="120" viewBox="0 0 100 100">
  <line x1="50" y1="10" x2="50" y2="40"
        stroke="black" stroke-width="6">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="1s"
      repeatCount="indefinite" />
  </line>
</svg>

<!-- 6. PATH DRAW -->
<h2>6️⃣ Path Drawing Animation</h2>
<svg width="300" height="100">
  <path d="M10 50 L290 50"
        fill="none"
        stroke="black"
        stroke-width="4"
        stroke-dasharray="280"
        stroke-dashoffset="280">
    <animate
      attributeName="stroke-dashoffset"
      from="280"
      to="0"
      dur="2s"
      fill="freeze" />
  </path>
</svg>

<!-- 7. FADE -->
<h2>7️⃣ Fade In / Out</h2>
<svg width="200" height="100">
  <text x="40" y="60" font-size="30">
    Hello
    <animate
      attributeName="opacity"
      values="0;1;0"
      dur="2s"
      repeatCount="indefinite" />
  </text>
</svg>

<!-- 8. CSS KEYFRAME ROTATION -->
<h2>8️⃣ CSS Keyframe Animation</h2>
<svg width="150" height="150">
  <rect x="40" y="40" width="70" height="70" class="css-rotate" />
</svg>

</body>
</html>
