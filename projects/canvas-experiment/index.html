<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Valentine’s Day ❤️</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="canvas" width="900" height="900"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Floating text animation
let textY = 185;
let direction = 1;

// 💖 Heart particles
const hearts = Array.from({ length: 20 }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  size: Math.random() * 6 + 4,
  speed: Math.random() * 0.3 + 0.15,
  drift: Math.random() * 0.6 - 0.3
}));

// 💘 Burst particles
const fireworks = [];

// 🎨 Valentine background
function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, "#800f2f");
  gradient.addColorStop(0.5, "#c9184a");
  gradient.addColorStop(1, "#ff4d6d");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.ellipse(
    canvas.width / 2,
    canvas.height / 2,
    canvas.width / 1.4,
    canvas.height / 3,
    0,
    0,
    Math.PI * 2
  );
  ctx.fillStyle = "#fff0f3";
  ctx.fill();
  ctx.globalAlpha = 1;
}

// 💗 Draw heart shape
function drawHeart(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(
    x - size, y - size,
    x - size * 2, y + size / 3,
    x, y + size * 2
  );
  ctx.bezierCurveTo(
    x + size * 2, y + size / 3,
    x + size, y - size,
    x, y
  );
  ctx.fill();
}

// 💞 Floating hearts
function drawHearts() {
  hearts.forEach(h => {
    drawHeart(h.x, h.y, h.size, "rgba(255,255,255,0.8)");
    h.y -= h.speed;
    h.x += h.drift;

    if (h.y < -20) {
      h.y = canvas.height + 20;
      h.x = Math.random() * canvas.width;
    }
  });
}

// 💥 Valentine burst
function createFirecracker() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height * 0.5 + 60;
  const colors = ["#ffb3c1", "#ff4d6d", "#ff758f", "#ffd6e0"];

  for (let i = 0; i < 30; i++) {
    fireworks.push({
      x,
      y,
      angle: Math.random() * Math.PI * 2,
      speed: Math.random() * 2.2 + 0.8,
      radius: Math.random() * 2 + 1,
      life: 90,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

// ✨ Draw bursts
function drawFirecrackers() {
  for (let i = fireworks.length - 1; i >= 0; i--) {
    const f = fireworks[i];

    f.x += Math.cos(f.angle) * f.speed;
    f.y += Math.sin(f.angle) * f.speed;
    f.life--;

    ctx.beginPath();
    ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
    ctx.fillStyle = f.color;
    ctx.globalAlpha = f.life / 90;
    ctx.fill();

    if (f.life <= 0) fireworks.splice(i, 1);
  }
  ctx.globalAlpha = 1;
}

// 🖋 Valentine text
function drawText() {
  ctx.textAlign = "center";
  ctx.shadowColor = "rgba(255,20,80,0.9)";
  ctx.shadowBlur = 28;

  ctx.font = "700 40px 'Playfair Display'";
  ctx.fillStyle = "#fff0f3";
  ctx.fillText("Happy Valentine’s Day ❤️", canvas.width / 2, textY);

  ctx.font = "400 18px 'Poppins'";
  ctx.fillStyle = "#ffe5ec";
  ctx.fillText(
    "Love, laughter, and forever moments",
    canvas.width / 2,
    textY + 46
  );

  ctx.shadowBlur = 0;
}

// 🎬 Animation loop
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBackground();
  drawHearts();
  drawFirecrackers();
  drawText();

  if (Math.random() < 0.03) createFirecracker();

  textY += 0.22 * direction;
  if (textY > 195 || textY < 175) direction *= -1;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
