<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: aqua;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: blue;
            color:blueviolet;
        }

        button:active {
            background-color: brown;
        }
    </style>
</head>
<body>
    <h2>Button hover</h2>
    <button>Hover Me</button>
</body>
</html>
