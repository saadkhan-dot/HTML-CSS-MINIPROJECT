<!DOCTYPE html>
<html>
<head>
<style>
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  width: 120px;
  height: 120px;
  background: lightcoral;

  /* Transform origin */
  transform-origin: center;

  /* Multiple transforms */
  transform: rotate(10deg) scale(1.2) translateX(50px);
}
</style>
</head>

<body>
  <div class="box"></div>
</body>
</html>
