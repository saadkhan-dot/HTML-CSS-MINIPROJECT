<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            padding: 10px;
            font-size: 14px;
            border: 2px solid gray;
            border-radius: 4px;
            outline: none;
            text-align: center;
        }

        input:focus {
            border: 2px solid blue;
            color: blueviolet;
        }
        a {
            color: aliceblue;
            text-decoration: none;
            font-size: 18px;
        }
        a:hover {
            color: blue;
            text-decoration: underline;
        }
        a:visited {
            color: brown;
        }
        li:first-child {
            color: red;
        }
        li:last-child {
            color: green;
        }
        li:nth-child(4) {
            color: orange;
        }
        li:nth-child(odd) {
           color: lightgray;
        }
        li:nth-child(even) {
            color: lightblue;
        }
    </style>
</head>
<body>
    <h2>input focus</h2>
    <input type="text" placeholder="Focus on me">

</body>
</html>
